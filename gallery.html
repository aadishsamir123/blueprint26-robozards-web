<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robozards | Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="site-nav" aria-label="Main navigation">
      <a class="nav-brand" href="index.html">ROBOZARDS</a>
      <div class="nav-menu">
        <a class="nav-link" href="index.html">PROJECT</a>
        <a class="nav-link active" href="gallery.html">GALLERY</a>
        <a class="nav-link" href="code.html">CODE</a>
        <a class="nav-link" href="team.html">TEAM</a>
      </div>
    </nav>

    <header class="site-header">
      <p class="tag">BLUEPRINT 2026</p>
      <h1>MEDIA GALLERY</h1>
      <p class="subtitle">Project moments and highlights.</p>
    </header>

    <main>
      <section class="card gallery-shell">
        <div id="gallerySections" class="gallery-sections"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Built by Team Robozards | Blueprint 2026</p>
    </footer>

    <div id="galleryModal" class="gallery-modal hidden" aria-hidden="true">
      <div
        class="gallery-modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="galleryModalCaption"
      >
        <button
          type="button"
          id="galleryModalClose"
          class="gallery-modal-close"
          aria-label="Close media preview"
        >
          CLOSE
        </button>
        <img id="galleryModalImage" class="gallery-modal-image" alt="" />
        <p id="galleryModalCaption" class="gallery-modal-caption"></p>
      </div>
    </div>

    <script src="gallery.js"></script>
  </body>
</html>
